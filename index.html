<!DOCTYPE html>
<html><head>
<base target="_top">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap">
<style>
  :root{
    /* warm cream surfaces, near-black warm ink */
    --grey:#f1ece1; --paper:#fbf8f1; --black:#191c12; --ink2:#39402f; --muted:#6f745f;
    /* mint / pastel-green accents */
    --mint:#cfeadd; --pastel:#dcefd6; --lime:#6ecf98; --lime-deep:#1a7a4f; --moss:#2c7a62;
    --line:#e6dfce; --shadow:0 1px 2px #1c1f1410,0 8px 22px #1c1f1412;
    /* aliases reused across markup (do not remove) */
    --cream:var(--grey); --espresso:var(--black); --bean:var(--ink2);
    --crema:var(--lime); --amber:var(--lime-deep); --rust:#aa4226;
    /* status tints */
    --glow:0 0 0 3px rgba(110,207,152,.4);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--grey);color:var(--black);
    font-family:'IBM Plex Sans',system-ui,sans-serif;font-size:16px;line-height:1.45;
    -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
  .num{font-family:'IBM Plex Mono',monospace;font-variant-numeric:tabular-nums}
  .wrap{max-width:540px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--grey)}
  header{position:sticky;top:0;z-index:20;background:var(--black);color:var(--grey);
    padding:14px 16px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;
    box-shadow:0 1px 0 #00000022,0 6px 18px #19140c2e}
  #backBtn{grid-column:1;justify-self:start;border:none;background:transparent;color:var(--grey);
    padding:6px 6px 6px 0;font:inherit;font-size:14.5px;font-weight:600;white-space:nowrap;cursor:pointer}
  #backBtn:active{opacity:.55;background:transparent}
  header .brand{grid-column:2;justify-self:center}
  #homeBtn{grid-column:3;justify-self:end}
  header .brand{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:.2px;display:flex;gap:9px;align-items:center}
  header .dot{width:9px;height:9px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 4px rgba(110,207,152,.28)}
  header button{background:transparent;border:1px solid #ffffff33;color:var(--grey);
    border-radius:999px;padding:6px 13px;font:inherit;font-size:13px;cursor:pointer;transition:background .12s,border-color .12s}
  header button:active{background:#ffffff1a}
  main{flex:1;padding:18px 16px 40px}
  h2{font-family:'Fraunces',serif;font-weight:600;font-size:23px;margin:4px 0 2px;letter-spacing:-.01em;color:var(--black)}
  .sub{color:var(--muted);font-size:13.5px;margin:0 0 18px}
  .back{display:inline-flex;align-items:center;gap:4px;background:none;border:none;color:var(--ink2);
    font:inherit;font-weight:600;font-size:15px;cursor:pointer;padding:0 0 12px;margin:0}
  .back:active{color:var(--lime-deep)}
  .card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:16px;
    box-shadow:var(--shadow);margin-bottom:14px}
  .tap{display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;
    background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:18px;
    box-shadow:var(--shadow);margin-bottom:13px;font:inherit;color:inherit;transition:transform .08s,border-color .12s,box-shadow .12s}
  .tap:active{transform:scale(.985);border-color:var(--lime)}
  .tap .ico{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:22px;flex:none;
    background:var(--mint);border:1px solid #bfe0cf}
  .tap .ttl{font-weight:600;font-size:17px;letter-spacing:-.005em}
  .tap .dsc{color:var(--muted);font-size:13px;margin-top:2px}
  .tap .chev{margin-left:auto;color:var(--lime-deep);font-size:20px}
  label{display:block;font-size:13px;font-weight:600;color:var(--bean);margin:14px 0 6px}
  select,input,textarea{width:100%;min-width:0;font:inherit;padding:12px 13px;border:1px solid var(--line);
    border-radius:12px;background:var(--paper);color:var(--black)}
  select::placeholder,input::placeholder,textarea::placeholder{color:#a7a995}
  select:focus,input:focus,textarea:focus{outline:none;border-color:var(--lime-deep);box-shadow:var(--glow)}
  .btn{display:block;width:100%;padding:15px;border:none;border-radius:13px;font:inherit;font-weight:700;touch-action:manipulation;
    font-size:16px;cursor:pointer;background:var(--lime);color:var(--black);box-shadow:var(--shadow);margin-top:18px;
    letter-spacing:.1px;transition:transform .08s,filter .12s}
  .btn:active{transform:scale(.99);filter:brightness(.97)}
  .btn.dark{background:var(--black);color:var(--grey)}
  .btn.ghost{background:transparent;color:var(--bean);border:1px solid var(--line);box-shadow:none;font-weight:600}
  .btn.ghost:active{background:#0000000a}
  .btn:disabled{opacity:.5}
  .row{display:flex;gap:10px;align-items:flex-end}
  .row > *{flex:1;min-width:0}
  .pill{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:700;letter-spacing:.3px}
  .s-OUT{background:#b5371c;color:#fdeee8} .s-REORDER,.s-LOW{background:#f6e6bf;color:#86570c}
  .s-OK{background:#cfe9d6;color:#236340}
  .line-item{display:flex;gap:8px;align-items:center;margin-bottom:9px}
  .line-item .x{flex:none;width:38px;height:42px;border:1px solid var(--line);border-radius:10px;background:var(--paper);color:var(--rust);font-size:18px;cursor:pointer}
  .tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:none;padding:9px 14px;border-radius:999px;border:1px solid var(--line);background:var(--paper);
    font-size:14px;font-weight:600;color:var(--muted);cursor:pointer}
  .tab.on{background:var(--black);color:var(--grey);border-color:var(--black)}
  .summary{display:flex;gap:9px;margin-bottom:16px}
  .summary .box{flex:1;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center;box-shadow:var(--shadow);font:inherit;color:inherit;cursor:pointer;transition:transform .08s,border-color .12s,box-shadow .12s}
  .summary .box:active{transform:scale(.98)}
  .summary .box.active{border-color:var(--lime-deep);box-shadow:0 0 0 2px rgba(26,122,79,.45)}
  .qty .u{font-size:12px;color:var(--muted);font-weight:500}
  .invhead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:4px;min-height:20px}
  .invhead .lbl{font-size:13px;font-weight:600;color:var(--bean)}
  .summary .n{font-family:'Fraunces',serif;font-size:26px;font-weight:600;line-height:1}
  .summary .l{font-size:11px;color:var(--muted);margin-top:5px;text-transform:uppercase;letter-spacing:.5px}
  .inv{border-top:1px solid var(--line)}
  .inv .item{padding:13px 2px;border-bottom:1px solid var(--line)}
  .inv .top{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
  .inv .nm{font-weight:600}
  .inv .qty{font-size:20px;font-weight:600}
  .inv .meta{color:var(--muted);font-size:12.5px;margin-top:5px;display:flex;flex-wrap:wrap;gap:4px 14px}
  /* dashboard open-flag rows */
  .flag{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .flag:last-child{border-bottom:none}
  .flag .info{flex:1}.flag .info small{color:var(--muted)}
  /* kiosk report rows */
  .krow{display:flex;flex-direction:column;gap:6px;padding:12px 0;border-bottom:1px solid var(--line)}
  .krow .main{display:flex;align-items:center;gap:10px}
  .krow .info{flex:1}.krow .info small{color:var(--muted)}
  .seg{display:flex;border:1px solid var(--line);border-radius:10px;overflow:hidden;flex:none}
  .seg button{border:none;background:var(--paper);padding:9px 12px;font:inherit;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;transition:background .1s,color .1s}
  .seg button + button{border-left:1px solid var(--line)}
  .seg button.low.on{background:#e8b53e;color:#3a2a05}
  .seg button.out.on{background:#b5371c;color:#fff}
  .seg button.none.on{background:#cfe9d6;color:#236340}
  .offbtn{align-self:flex-end;background:none;border:none;color:var(--muted);font:inherit;font-size:12px;text-decoration:underline;cursor:pointer;padding:2px 0 0}
  .offzone{margin-top:18px;border-top:2px dashed var(--line);padding-top:12px}
  .offhead{font-size:11.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);font-weight:700;margin-bottom:6px}
  .offrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .feed .hrow{display:flex;gap:10px;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
  .feed .hrow:last-child{border-bottom:none}
  .feed .hrow .grow{flex:1}.feed .hrow small{color:var(--muted)}
  .hwhen{white-space:nowrap;color:var(--muted);font-size:12px}
  .chgrow{padding:13px 0;border-bottom:1px solid var(--line)}
  .chgrow:last-child{border-bottom:none}
  .chgtop{display:flex;justify-content:space-between;align-items:baseline;gap:12px}
  .chgdesc{font-weight:600;line-height:1.3}
  .chgamt{font-family:'Fraunces',serif;font-weight:600;font-size:16px;white-space:nowrap}
  .chgmeta{color:var(--muted);font-size:12.5px;margin-top:4px;line-height:1.5}
  .chgactions{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-top:11px}
  .chgactions .btn{width:auto;margin-top:0;padding:9px 16px;font-size:13.5px}
  .chgactions .chgremove{color:var(--muted);font-weight:600;margin-left:auto}
  .milkbox{background:var(--mint,#e7f3ec);border:1px solid #bfe0cf;border-radius:13px;padding:13px;margin-bottom:12px}
  .milkbox.overdue{background:#fdeee7;border-color:#e9b8a3}
  .milkstat{font-weight:700;font-size:15px;color:var(--bean,#2f5d43)}
  .milkbox.overdue .milkstat{color:#b34a23}
  .milksub{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.45}
  .milktoggle{margin-top:11px;width:100%;padding:12px;border-radius:11px;border:1px solid var(--line);background:var(--paper);font:inherit;font-weight:700;cursor:pointer;color:var(--bean,#2f5d43);touch-action:manipulation}
  .milktoggle.on{background:var(--lime);border-color:var(--lime-deep);color:var(--black)}
  .milkmark{display:inline-block;margin-top:5px;font-size:11.5px;font-weight:700;color:var(--moss);background:var(--mint,#e7f3ec);border:1px solid #bfe0cf;border-radius:8px;padding:2px 8px}
  .pastday{opacity:.82}
  .empty{text-align:center;color:var(--muted);padding:26px 10px;font-size:14px}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}
  .link{color:var(--lime-deep);font-weight:600;background:none;border:none;font:inherit;cursor:pointer;padding:0}
  #toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--black);color:var(--grey);padding:12px 18px;border-radius:12px;font-size:14px;
    box-shadow:0 8px 30px #19140c44;transition:.25s;z-index:50;max-width:90%;pointer-events:none}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.err{border:1px solid var(--rust)}
  .center{display:grid;place-items:center;min-height:50vh;color:var(--muted);gap:12px}
  .spin{width:30px;height:30px;border:3px solid var(--line);border-top-color:var(--lime-deep);border-radius:50%;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .mgr-row{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
  .mgr-row:last-child{border-bottom:none}
  .mgr-row .grow{flex:1}.mgr-row small{color:var(--muted)}
  .badge{font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:999px;white-space:nowrap}
  .b-overlap{background:#cfe9d6;color:#236340}
  .b-unique{background:#f6e6bf;color:#86570c}
  .b-model{background:#c8e7df;color:#196458}
  .sec{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:20px 0 8px}
  .sec h3{font-family:'Fraunces',serif;font-weight:600;font-size:16px;margin:0;color:var(--black)}
  .citem{padding:11px 0;border-bottom:1px solid var(--line)}
  .citem:last-child{border-bottom:none}
  .citem .crow{display:flex;gap:11px;align-items:flex-start}
  .citem input[type=checkbox]{width:22px;height:22px;margin-top:1px;flex:none;accent-color:var(--lime-deep);cursor:pointer}
  .citem .lab{flex:1}
  .citem .lab .nm{font-weight:600}
  .citem .lab .sub2{font-size:12px;color:var(--muted);margin-top:2px}
  .req{color:var(--lime-deep);font-size:10px;font-weight:700;text-transform:uppercase;margin-left:6px}
  .det{font-size:13px;color:var(--ink2);margin:8px 0 0 33px;background:#eef5ee;border:1px solid #d9e7da;border-radius:10px;padding:8px 11px;display:none}
  .det.open{display:block}
  .det ul{margin:0;padding-left:16px}
  .citem .acts{margin:8px 0 0 33px;display:flex;gap:16px;flex-wrap:wrap}
  .citem textarea{margin:8px 0 0 33px;width:calc(100% - 33px);min-height:46px}
  .citem.flagged{background:#fcf3e0;border-radius:10px;margin:0 -8px;padding:11px 8px}
  .sku-ref{font-size:11px;color:var(--lime-deep);font-weight:600;margin-top:3px}
  .prog{height:8px;border-radius:999px;background:var(--line);overflow:hidden;margin:6px 0 0}
  .prog > i{display:block;height:100%;background:var(--lime)}
  .kpi{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:8px}
  .kpi .b{flex:1;min-width:90px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:11px;text-align:center;box-shadow:var(--shadow)}
  .kpi .b .n{font-family:'Fraunces',serif;font-size:22px;font-weight:600}
  .kpi .b .l{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}
  .mgrhd{font-family:'Fraunces',serif;font-size:15px;margin:16px 2px 7px;color:var(--moss)}
  .mgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:4px}
  .mtile{background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:15px 8px;text-align:center;box-shadow:var(--shadow);cursor:pointer;font:inherit;transition:transform .08s,border-color .12s}
  .mtile:active{transform:scale(.97);border-color:var(--lime)}
  .mtile .i{font-size:22px}
  .mtile .t{font-size:13px;margin-top:7px;font-weight:600;letter-spacing:.1px;line-height:1.22}
  .alertcard{border-left:5px solid var(--lime-deep);background:#f3f8f1}
  .alertcard.warn{border-left-color:var(--rust);background:#fbf2ee}
  .schfilt{display:flex;gap:7px;flex-wrap:wrap;margin:2px 0 10px}
  .chip{background:var(--paper);border:1px solid var(--line);border-radius:999px;padding:6px 13px;font:inherit;font-size:13px;cursor:pointer}
  .chip.on{background:var(--black);color:var(--paper);border-color:var(--black)}
  .schday{padding:11px 13px}
  .schdate{font-family:'Fraunces',serif;font-size:14px;margin-bottom:4px;color:var(--moss)}
  .schrow{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid var(--line)}
  .schrow:first-of-type{border-top:none}
  .schrow.cover{background:#fbf0ea;margin:0 -13px;padding:9px 13px;border-radius:8px;border-top:none;box-shadow:inset 4px 0 0 var(--rust)}
  .schrow.cover small{color:var(--rust);font-weight:600}
  .schrow .grow{flex:1}
  .schmonth{display:block;width:100%;text-align:left;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 13px;margin:8px 0 4px;font:inherit;font-weight:600;cursor:pointer;color:var(--moss)}
  .schmonth.on{background:transparent;border-style:dashed}
  /* category section headers for grouped stock lists */
  .cathd{display:flex;align-items:center;gap:8px;font-size:11.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--moss);margin:18px 0 2px;padding-bottom:7px;border-bottom:1px solid var(--line)}
  .cathd:first-child{margin-top:4px}
  .cathd .cati{font-size:14px;line-height:1}
  .cathd .catt{flex:0 1 auto}
  .catn{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:11px;letter-spacing:0;color:var(--muted)}
  .catchev{font-size:11px;color:var(--muted);margin-left:9px}
  .cathd.collapsed{opacity:.72}
  .stickybar{position:sticky;bottom:0;z-index:12;margin:14px -16px 0;padding:12px 16px calc(12px + env(safe-area-inset-bottom));background:linear-gradient(to top,var(--paper) 72%,rgba(251,248,241,0));border-top:1px solid var(--line)}
  .stickybar .btn{margin-top:0}
  .stickybtns{display:flex;gap:10px}
  .stickybtns .btn{margin-top:0;width:auto}
  .stickybtns .ghost{flex:0 0 auto}
  .stickybtns .btn:not(.ghost){flex:1}
  .svcprlbl{font-size:12px;color:var(--muted);text-align:center;margin:0 0 6px}
  .svcsaved{font-size:11.5px;color:var(--moss);text-align:center;margin:0 0 9px;min-height:13px}
  .cardtoglabel{cursor:pointer;user-select:none}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <button id="backBtn" style="display:none">‹ Back</button>
    <div class="brand"><span class="dot"></span><span id="brandText">Robo Café</span></div>
    <button id="homeBtn" onclick="go('home')" style="display:none">Switch role</button>
  </header>
  <main id="main"><div class="center"><div class="spin"></div><div>Loading…</div></div></main>
</div>
<div id="toast"></div>

<script>


/* ----- backend connection -----
   This page is hosted on GitHub Pages and talks to the Apps Script backend by
   POSTing JSON to the deployed web-app URL below. All calls made in the same
   moment (e.g. a screen's Promise.all) are automatically bundled into ONE
   request, so multi-call screens cost a single round trip. */
var SCRIPT_URL='https://script.google.com/macros/s/AKfycbz7EDiFcBVWnxR9UQgLVbs633aZ-J_kx8wUGznGAjZlKBPArd0IWzxv-NsqFdUcPkI/exec';

var AUTH={ token:'', name:'', role:'' };
function authLoad(){ AUTH.token=lsGet('rc_token')||''; AUTH.name=lsGet('rc_name')||''; AUTH.role=lsGet('rc_role')||''; }
function authSave(token,name,role){ AUTH.token=token||''; AUTH.name=name||''; AUTH.role=role||'';
  lsSet('rc_token',AUTH.token); lsSet('rc_name',AUTH.name); lsSet('rc_role',AUTH.role); }
function authClear(){ authSave('','',''); }

var _authKick=false;
function authExpired(){
  authClear();
  if(_authKick) return; _authKick=true; setTimeout(function(){_authKick=false;},1500);
  toast('Session expired — sign in again',true);
  go('home');
}

var _batch=null;
function rawCall_(fn,args){
  if(!_batch){ _batch={calls:[],waiters:[]}; setTimeout(flushBatch_,0); }
  var b=_batch;
  return new Promise(function(res,rej){ b.calls.push({fn:fn,args:args}); b.waiters.push({res:res,rej:rej}); });
}
function flushBatch_(){
  var b=_batch; _batch=null;
  if(!b || !b.calls.length) return;
  fetch(SCRIPT_URL,{ method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({ token:AUTH.token, calls:b.calls }) })
  .then(function(r){ return r.json(); })
  .then(function(out){
    if(!out || out.ok!==true) throw new Error((out&&out.error)||'Server error — try again.');
    var sawAuth=false;
    (out.results||[]).forEach(function(r,i){
      var w=b.waiters[i]; if(!w) return;
      if(r && r.ok){ if(WRITE_FNS[b.calls[i].fn]) clearDataCache(); w.res(r.result); }
      else { if(r && r.code==='auth') sawAuth=true; w.rej(new Error((r&&r.error)||'Request failed.')); }
    });
    if(sawAuth) authExpired();
  })
  .catch(function(e){
    var msg=(e && /Server error|try again/.test(e.message||'')) ? e.message : 'Connection problem — check your internet and try again.';
    b.waiters.forEach(function(w){ w.rej(new Error(msg)); });
  });
}

/* ----- instant screens: device-side data memory (stale-while-revalidate) -----
   Results of the read calls below are remembered on the device. Revisiting a
   screen paints IMMEDIATELY from that memory while fresh data loads quietly
   behind; if the fresh data differs, the screen quietly repaints — but only
   screens that register VIEW.repaint (read-only listings, never forms).
   Any successful write wipes the memory, so you never see pre-submission
   numbers. Kiosk report + service checklist reads are deliberately NOT here —
   those must always be live. */
var SWR_FNS={ getInventory:1,getDashboard:1,getServiceFlags:1,getScheduleOverrides:1,getServiceSummary:1,
  getServiceSessions:1,getServiceSession:1,getHistory:1,getServiceReport:1,getPayments:1,getCharges:1,
  getPickupList:1,getMilkBagLog:1,getPeopleForManager:1,getAllSkusForManager:1,getBackupStatus:1 };
var WRITE_FNS={ recordWithdrawal:1,recordReceipt:1,recordAdjustment:1,recordKioskFlags:1,resolveFlag:1,
  saveSku:1,setSkuActive:1,saveLocation:1,setLocationActive:1,savePerson:1,setPersonActive:1,
  setLowDaysThreshold:1,syncStandardItems:1,setLocationSkuInUse:1,saveServiceSession:1,
  requestCoverage:1,claimCoverage:1,cancelCoverage:1,savePayment:1,voidPayment:1,addCharge:1,
  setChargePaid:1,voidCharge:1,clearServiceFlag:1,backupNow:1,setAutoBackup:1,managerResetPin:1 };
var SWR_TTL=60*60000;   // memory older than an hour shows a spinner instead
var SWR_FRESH=5000;     // data this new is trusted as-is (stops repaint loops)
var VIEW={ repaint:null };
var _refreshing={}, _repaintTimer=null;

function call(fn){
  var args=Array.prototype.slice.call(arguments,1);
  if(SWR_FNS[fn] && AUTH.token){
    var key='rc_c_'+fn+(args.length?'_'+JSON.stringify(args):'');
    var hit=null; try{ hit=JSON.parse(lsGet(key)||'null'); }catch(e){}
    var age=hit ? (Date.now()-hit.t) : Infinity;
    if(hit && age<SWR_TTL){
      if(age>SWR_FRESH) refreshData_(fn,args,key);
      return Promise.resolve(hit.v);
    }
    return rawCall_(fn,args).then(function(v){ lsSet(key,JSON.stringify({t:Date.now(),v:v})); return v; });
  }
  return rawCall_(fn,args);
}
function refreshData_(fn,args,key){
  if(_refreshing[key]) return;
  _refreshing[key]=1;
  rawCall_(fn,args).then(function(v){
    delete _refreshing[key];
    var oldV=''; try{ var o=JSON.parse(lsGet(key)||'null'); if(o) oldV=JSON.stringify(o.v); }catch(e){}
    lsSet(key,JSON.stringify({t:Date.now(),v:v}));
    if(JSON.stringify(v)!==oldV) scheduleRepaint_();
  }).catch(function(){ delete _refreshing[key]; });
}
function scheduleRepaint_(){
  if(_repaintTimer) return;
  _repaintTimer=setTimeout(function(){ _repaintTimer=null; if(VIEW.repaint) VIEW.repaint(); },60);
}
function clearDataCache(){
  var kill=[];
  try{ for(var i=0;i<localStorage.length;i++){ var k=localStorage.key(i); if(k&&k.indexOf('rc_c_')===0) kill.push(k); } }catch(e){}
  kill.forEach(function(k){ try{ localStorage.removeItem(k); }catch(e){} });
}

function totalVol(qty,note){
  if(note==null) return '';
  var m=String(note).trim().match(/^([\d.]+)\s*(.+)$/);
  if(!m) return '';
  var per=parseFloat(m[1]); var unit=m[2].trim();
  if(isNaN(per)) return '';
  var total=qty*per;
  if(/^ml$/i.test(unit) && total>=1000){ total=total/1000; unit='L'; }
  else if(/^g$/i.test(unit) && total>=1000){ total=total/1000; unit='kg'; }
  total=Math.round(total*100)/100;
  return total+' '+unit;
}

function makeCardCollapsible(card,key,defOpen){
  var label=card.querySelector('label'); if(!label) return card;
  var bd=el('<div class="cardbody"></div>');
  while(label.nextSibling) bd.appendChild(label.nextSibling);
  card.appendChild(bd);

function screenPin(){
  if(!LOGIN){ go('home'); return; }
  M.innerHTML=''; M.appendChild(backBtn('home'));
  var creating=!LOGIN.hasPin;
  M.appendChild(el('<div><h2>'+esc(LOGIN.name)+'</h2><p class="sub">'+(creating?'Create a 4-digit PIN — you\'ll use it each time you open the app.':'Enter your 4-digit PIN.')+'</p></div>'));
  var c=el('<div class="card"></div>');
  c.appendChild(el('<label style="margin-top:0">'+(creating?'New PIN':'PIN')+'</label>'+pinInput('pin1')));
  if(creating) c.appendChild(el('<label>Confirm PIN</label>'+pinInput('pin2')));
  var btn=el('<button class="btn">'+(creating?'Create PIN & continue':'Continue')+'</button>'); c.appendChild(btn);
  if(LOGIN.err){ c.appendChild(el('<div class="hint" style="color:var(--rust);font-weight:600;line-height:1.5">'+esc(LOGIN.err)+'</div>')); LOGIN.err=null; }
  M.appendChild(c);
  function proceed(role, token){
    authSave(token||'', LOGIN.name, role);
    APP.me={name:LOGIN.name, role:role}; APP.role=role; lsSet('rc_lastPerson',APP.me.name);
    var r=role; LOGIN=null;
    var home = r==='manager' ? 'mgr' : 'techHome';
    if(APP.boot){ go(home); refreshBoot().catch(function(){}); }
    else { loading('Loading…'); refreshBoot().then(function(){ go(home); }).catch(function(e){ toast(e.message||e,true); go('home'); }); }
  }
  function fail(msg){ LOGIN.err=msg; screenPin(); toast(msg,true); }
  btn.onclick=function(){
    var p1=val('pin1');
    if(!/^\d{4}$/.test(p1)) return toast('Enter a 4-digit PIN',true);
    if(creating){
      if(val('pin2')!==p1) return toast('PINs don\'t match',true);
      loading('Saving…');
      call('setPin',LOGIN.name,p1).then(function(r){ toast('PIN set ✓'); proceed(r.role||LOGIN.role, r.token); }).catch(function(e){ fail(e.message||String(e)); });
    } else {
      loading('Checking…');
      call('verifyIdentity',LOGIN.name,p1).then(function(r){
        r=r||{};
        if(r.needsPin){ LOGIN.hasPin=false; toast('Let\'s set up a PIN'); screenPin(); return; }
        if(r.ok){ proceed(r.role, r.token); return; }
        if(r.locked){ fail(r.error||'Too many incorrect attempts — this PIN is locked. Message a manager to reset it.'); return; }
        fail('Incorrect PIN'+(r.attemptsLeft!=null?(' — '+r.attemptsLeft+' attempt'+(r.attemptsLeft===1?'':'s')+' left before it locks'):''));
      }).catch(function(e){ fail(e.message||String(e)); });
    }
  };
}

function mapLocToKiosk(loc){
  var s=(loc||'').toLowerCase();
  if(/u of t|uoft|u\.? of t|toronto|sid/.test(s)) return 'uoft';
  if(/sinai/.test(s)) return 'sinai';
  if(/rbc|amphi|bud/.test(s)) return 'bud';
  return null;
}
function nextServiceDateLabel(kioskId){
  if(!kioskId) return '';
  var d=new Date(); d.setHours(0,0,0,0);
  for(var i=0;i<160;i++){ var iso=isoDateLocal(d); if(isServiceDay(kioskId,d,iso)) return d.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}); d.setDate(d.getDate()+1); }
  return '';
}

function loadBoard(){

}
function renderBoard(b){
  b=b||{}; b.inUse=b.inUse||[]; b.notInUse=b.notInUse||[];
  var board=document.getElementById('fBoard'); board.innerHTML='';
  if(!b.inUse.length && !b.notInUse.length){ board.innerHTML='<div class="empty">No items.</div>'; return; }
  (b.inUse||[]).forEach(function(it){ if((it.current==='low'||it.current==='out') && FLAG.sel[it.skuId]===undefined) FLAG.sel[it.skuId]=it.current; });
  var groups=groupByCat(b.inUse);
  STOCK_CATS.forEach(function(cat){
    var items=groups[cat.k]; if(!items||!items.length) return;
    var hd=catHeader(cat,items.length);
    var grp=el('<div class="catgrp"></div>');
    items.forEach(function(it){ grp.appendChild(kioskRow(it)); });
    wireCatToggle(hd,grp,'flag_'+cat.k);
    board.appendChild(hd); board.appendChild(grp);
  });
  var off=el('<div class="offzone"></div>');
  off.appendChild(el('<div class="offhead">Not currently in use at this location</div>'));
  if(!b.notInUse.length) off.appendChild(el('<div class="hint">Nothing here. Tap "Not in use here" on an item above to move it down.</div>'));
  b.notInUse.forEach(function(it){
    var r=el('<div class="offrow"><div>'+esc(it.name)+' <small style="color:var(--muted)">'+esc(it.baseUnitNote||it.baseUnit)+'</small></div><button class="link">Use again</button></div>');
    r.querySelector('.link').onclick=function(){ setUse(it.skuId,true); };

  });

  var bar=el('<div class="stickybar"></div>');
  var btn=el('<button class="btn" id="flagSubmit">Submit report</button>'); btn.onclick=submitFlags;
  bar.appendChild(btn); board.appendChild(bar);

}
function kioskRow(it){
  var sel=FLAG.sel[it.skuId]||'';
  var r=el('<div class="krow" data-sku="'+it.skuId+'">'+
    '<div class="main"><div class="info"><div>'+esc(it.name)+'</div><small>'+esc(it.baseUnitNote||it.baseUnit)+'</small></div>'+
    '<div class="seg">'+
      '<button class="none'+(sel===''?' on':'')+'" data-v="">OK</button>'+
      '<button class="low'+(sel==='low'?' on':'')+'" data-v="low">Low</button>'+
      '<button class="out'+(sel==='out'?' on':'')+'" data-v="out">Out</button>'+
    '</div></div></div>');
  var seg=r.querySelector('.seg');
  seg.querySelectorAll('button').forEach(function(bn){
    bn.onclick=function(){ seg.querySelectorAll('button').forEach(function(x){x.classList.remove('on');}); bn.classList.add('on'); FLAG.sel[it.skuId]=bn.getAttribute('data-v'); refreshFlagBar(); };
  });
  var off=el('<button class="offbtn">Not in use here</button>');
  off.onclick=function(){ setUse(it.skuId,false); };
  r.appendChild(off);
  return r;
}
function refreshFlagBar(){
  var n=Object.keys(FLAG.sel).filter(function(k){var v=FLAG.sel[k];return v==='low'||v==='out';}).length;
  var label = n ? ('Submit report · '+n+' flagged') : 'Submit report · kiosk clean';
  ['flagSubmit','flagSubmitTop'].forEach(function(id){ var b=document.getElementById(id); if(b) b.textContent=label; });
}
function setUse(skuId,inUse){
  call('setLocationSkuInUse',FLAG.loc,skuId,inUse).then(loadBoard).catch(function(e){toast(e.message||e,true);});
}
function submitFlags(){
  var items=[];
  Object.keys(FLAG.sel).forEach(function(sku){ var v=FLAG.sel[sku]; if(v==='low'||v==='out') items.push({skuId:sku,status:v}); });
  loading('Submitting…');

      FLAG.sel={}; go('techHome'); })

}

// Drill-down pages opened from the four dashboard count tiles.
function mgrCount(kind){
  VIEW.repaint=function(){ mgrCount(kind); };
  var meta={ out:{t:'Out',s:'Items out of stock.'}, reorder:{t:'To reorder',s:'Items running low.'},
    flags:{t:'Service flags',s:'Issues flagged during servicing.'}, coverage:{t:'Coverage needed',s:'Shifts that need someone.'} }[kind]||{t:'',s:''};
  M.innerHTML=''; M.appendChild(backBtn('mgr'));
  M.appendChild(el('<div><h2>'+esc(meta.t)+'</h2><p class="sub">'+esc(meta.s)+'</p></div>'));
  var body=el('<div><div class="center"><div class="spin"></div></div></div>'); M.appendChild(body);

  if(kind==='flags'){
    call('getServiceFlags').then(function(flags){
      flags=flags||[]; body.innerHTML='';
      if(!flags.length){ body.appendChild(el('<div class="empty">No servicing issues flagged. 🎉</div>')); return; }
      var card=el('<div class="card"></div>');
      flags.forEach(function(f){
        var r=el('<div class="flag"><div class="info"><div><b>'+esc(f.label)+'</b> · '+esc(f.location)+'</div>'+
          '<small>'+esc(f.technician||'—')+(f.serviceDate?' · '+esc(f.serviceDate):'')+(f.note?' — '+esc(f.note):'')+'</small></div>'+
          '<button class="link" style="margin-left:10px">Clear</button></div>');
        r.querySelector('.link').onclick=function(){ call('clearServiceFlag',f.sessionId,f.itemId).then(function(){toast('Cleared ✓');mgrCount('flags');}).catch(function(e){toast(e.message||e,true);}); };
        card.appendChild(r);
      });
      body.appendChild(card);
    }).catch(function(e){ body.innerHTML='<div class="empty">'+esc(e.message||e)+'</div>'; });
    return;
  }

  if(kind==='coverage'){
    call('getScheduleOverrides').then(function(ovr){
      ovr=ovr||[]; body.innerHTML='';
      var today=isoDateLocal(new Date());
      var cov=ovr.filter(function(o){ return o.coverageRequested && !o.claimedBy && String(o.date)>=today; })
                 .sort(function(a,b){return String(a.date).localeCompare(String(b.date));});
      if(!cov.length){ body.appendChild(el('<div class="empty">No coverage needed right now. ✅</div>')); }
      else {
        var card=el('<div class="card"></div>'); var me=(APP.me&&APP.me.name)||'';
        cov.forEach(function(o){
          var k=svcKiosk(o.kioskId)||{locationName:o.kioskId};
          var dn=new Date(o.date+'T00:00:00').toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
          var r=el('<div class="flag"><div class="info"><div><b>'+esc(dn)+'</b> · '+esc(k.locationName)+'</div>'+
            '<small>'+esc(o.requestedBy||'?')+' can\'t make it</small></div><button class="link">Pick up</button></div>');
          r.querySelector('.link').onclick=function(){ if(!me) return toast('Sign in first',true); call('claimCoverage',{date:o.date,kioskId:o.kioskId,claimedBy:me}).then(function(){toast('You picked it up ✓');mgrCount('coverage');}).catch(function(e){toast(e.message||e,true);}); };
          card.appendChild(r);
        });
        body.appendChild(card);
      }
      var open=el('<button class="btn ghost">Open the master schedule</button>'); open.onclick=function(){ mgrOpen('schedule'); };
      body.appendChild(open);
    }).catch(function(e){ body.innerHTML='<div class="empty">'+esc(e.message||e)+'</div>'; });
    return;
  }

  // out / reorder: kiosk reports (resolvable) + warehouse levels
  call('getDashboard').then(function(d){
    d.inventory=d.inventory||[]; d.openFlags=d.openFlags||[]; body.innerHTML='';
    var wantOut = kind==='out';
    var reports=d.openFlags.filter(function(f){ return wantOut ? f.status==='out' : f.status==='low'; });
    var whItems=d.inventory.filter(function(i){ return wantOut ? i.status==='OUT' : (i.status==='REORDER'||i.status==='LOW'); });
    if(!reports.length && !whItems.length){ body.appendChild(el('<div class="empty">Nothing '+(wantOut?'out':'to reorder')+'. ✅</div>')); return; }
    if(reports.length){
      body.appendChild(el('<div class="mgrhd" style="margin-top:2px">Reported at kiosks</div>'));
      var rc=el('<div class="card"></div>');
      reports.forEach(function(f){
        var r=el('<div class="flag"><div class="info"><div><b>'+esc(f.skuName)+'</b> · '+esc(f.locationName)+'</div>'+
          '<small>'+esc(f.byName)+(f.note?' — '+esc(f.note):'')+'</small></div>'+
          '<span class="pill s-'+(wantOut?'OUT':'REORDER')+'">'+(wantOut?'OUT':'LOW')+'</span>'+
          '<button class="link" style="margin-left:10px">Clear</button></div>');
        r.querySelector('.link').onclick=function(){ call('resolveFlag',f.id,'manager').then(function(){toast('Cleared ✓');mgrCount(kind);}).catch(function(e){toast(e.message||e,true);}); };
        rc.appendChild(r);
      });
      body.appendChild(rc);
    }
    if(whItems.length){
      body.appendChild(el('<div class="mgrhd">In the warehouse</div>'));
      var wc=el('<div class="card"></div>');
      whItems.forEach(function(i){
        wc.appendChild(el('<div class="hrow"><div class="grow"><div><b>'+esc(i.name)+'</b> <span class="pill s-'+i.status+'">'+i.status+'</span></div></div>'+
          '<div class="hwhen">'+i.qty+' '+esc(i.baseUnit)+'</div></div>'));
      });
      body.appendChild(wc);
      var rcv=el('<button class="btn ghost">Receive stock</button>'); rcv.onclick=function(){ mgrOpen('receive'); };
      body.appendChild(rcv);
    }
  }).catch(function(e){ body.innerHTML='<div class="empty">'+esc(e.message||e)+'</div>'; });
}

function mgrStock(body){
  body.innerHTML='<div class="center"><div class="spin"></div></div>';
  call('getDashboard').then(function(d){
    body.innerHTML='';
    var filter=null;
    d.openFlags=d.openFlags||[]; d.inventory=d.inventory||[];
    var flagged={}; d.openFlags.forEach(function(f){ flagged[f.skuName]=true; });

    var summary=el('<div class="summary"></div>');
    function tile(n,label,color,key){
      var b=el('<button class="box" data-k="'+key+'"><div class="n" style="color:'+color+'">'+n+'</div><div class="l">'+label+'</div></button>');
      b.onclick=function(){ setFilter(key); };
      return b;
    }
    summary.appendChild(tile(d.counts.out,'Out','#13160f','out'));
    summary.appendChild(tile(d.counts.reorder,'Reorder','var(--lime-deep)','reorder'));
    summary.appendChild(tile(d.counts.flags,'Kiosk flags','var(--moss)','flags'));
    body.appendChild(summary);

    var card=el('<div class="card"><div class="invhead"><span class="lbl">Warehouse inventory</span></div><div class="inv"></div></div>');
    body.appendChild(card);

    function setFilter(key){ filter = (filter===key ? null : key); paint(); }
    function paint(){
      summary.querySelectorAll('.box').forEach(function(b){ b.classList.toggle('active', b.getAttribute('data-k')===filter); });
      var labels={out:'Out',reorder:'Reorder',flags:'Has kiosk flag'};
      var head=card.querySelector('.invhead'); head.innerHTML='';
      head.appendChild(el('<span class="lbl">Warehouse inventory'+(filter?' · '+labels[filter]:'')+'</span>'));
      if(filter){ var cl=el('<button class="link">Clear filter</button>'); cl.onclick=function(){ filter=null; paint(); }; head.appendChild(cl); }
      var inv=card.querySelector('.inv'); inv.innerHTML='';
      var list=d.inventory.filter(function(i){
        if(!filter) return true;
        if(filter==='out') return i.status==='OUT';
        if(filter==='reorder') return i.status==='REORDER'||i.status==='LOW';
        if(filter==='flags') return !!flagged[i.name];
        return true;
      });
      if(!list.length){ inv.appendChild(el('<div class="empty">Nothing matches this filter.</div>')); return; }
      list.forEach(function(i){
        var st=i.status==='LOW'?'REORDER':i.status;
        var vol=totalVol(i.qty,i.baseUnitNote);
        var meta=[];
        meta.push(i.hasUsageData ? ('uses ~'+i.avgDaily+'/day') : 'no usage data yet');
        if(i.daysLeft!=null) meta.push('~'+i.daysLeft+' days left');
        meta.push('lead '+i.leadDays+'d');
        meta.push('used 30d: '+i.withdraw30);
        meta.push('received 30d: '+i.receive30+' ('+i.receiveCount30+'×)');
        inv.appendChild(el('<div class="item"><div class="top"><div><div class="nm">'+esc(i.name)+'</div>'+
          '<span class="pill s-'+st+'">'+st+'</span></div>'+
          '<div class="qty num">'+i.qty+' <span class="u">'+esc(i.baseUnit)+'</span>'+(vol?' <span class="u">('+esc(vol)+')</span>':'')+'</div></div>'+
          '<div class="meta">'+meta.map(function(m){return '<span>'+esc(m)+'</span>';}).join('')+'</div></div>'));
      });
    }
    paint();
  }).catch(function(e){body.innerHTML='<div class="empty">'+esc(e.message||e)+'</div>';});
}

function historyRow(e){
  var w=e.when?new Date(e.when):null;
  var t=w?(w.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+w.toLocaleTimeString(undefined,{hour:'numeric',minute:'2-digit'})):'';
  var label;
  if(e.kind==='tx'){
    if(e.type==='withdraw') label='⬇︎ Took '+e.qty+' '+esc(e.unit)+' · '+esc(e.skuName);
    else if(e.type==='receive') label='⬆︎ Received '+e.qty+' '+esc(e.unit)+' · '+esc(e.skuName);
    else label='✎ Recount → '+e.qty+' · '+esc(e.skuName);
  } else {
    label=(e.type==='out'?'⛔ OUT':'⚠︎ LOW')+' · '+esc(e.skuName)+' @ '+esc(e.location);
  }
  return el('<div class="hrow"><div class="grow"><div>'+label+'</div><small>'+esc(e.by||'')+(e.note?' — '+esc(e.note):'')+'</small></div><div class="hwhen">'+t+'</div></div>');
}

/* ===================== MASTER SCHEDULE + STATUS + LABOUR ===================== */
function renderSchedule(body){
  body.innerHTML='<div class="center"><div class="spin"></div></div>';
  call('getScheduleOverrides').then(function(ovr){
   return call('getMilkBagLog').then(function(milkLog){
    body.innerHTML='';
    var me=(APP.me&&APP.me.name)||'';
    var ovMap={}; (ovr||[]).forEach(function(o){ ovMap[o.date+'|'+o.kioskId]=o; });
    milkLog=milkLog||{}; var milkSet={}; Object.keys(milkLog).forEach(function(kid){ milkSet[kid]={}; (milkLog[kid]||[]).forEach(function(ds){ milkSet[kid][ds]=true; }); });
    body.appendChild(el('<p class="sub" style="margin-top:0">Weekdays are Rob, weekends Peter. You can request coverage only for your own days; anyone can pick up a day that needs coverage.</p>'));

    var kioskList=[['all','All'],['uoft','University of Toronto'],['sinai','Mount Sinai Hospital'],['bud','RBC Amphitheatre']];
    var cur='all';
    var filt=el('<div class="schfilt"></div>');
    kioskList.forEach(function(kk){ var b=el('<button class="chip" data-k="'+kk[0]+'">'+kk[1]+'</button>'); b.onclick=function(){ cur=kk[0]; paint(); }; filt.appendChild(b); });
    body.appendChild(filt);
    var listWrap=el('<div></div>'); body.appendChild(listWrap);
    var expanded={}; var pastOpen=false; // monthKey -> true

    function build(){
      var days=[]; var today=new Date(); today.setHours(0,0,0,0);
      var end=new Date(today); end.setMonth(end.getMonth()+4);
      for(var d=new Date(today); d<=end; d.setDate(d.getDate()+1)){
        var iso=isoDateLocal(d), entries=[];
        SERVICE_KIOSKS.forEach(function(k){
          if(cur!=='all' && k.id!==cur) return;
          if(!isServiceDay(k.id,d,iso)) return;
          var base=defaultAssignee(d), o=ovMap[iso+'|'+k.id];
          var assignee=base, coverage=false, requestedBy='';
          if(o){ if(o.claimedBy) assignee=o.claimedBy; if(o.coverageRequested){ coverage=true; requestedBy=o.requestedBy; } }
          var event = k.id==='bud' ? BUD_CONCERTS[iso] : null;
          entries.push({kiosk:k,iso:iso,assignee:assignee,coverage:coverage,requestedBy:requestedBy,event:event});
        });
        if(entries.length) days.push({iso:iso,dateObj:new Date(d),entries:entries});
      }
      return days;
    }
    function buildPast(){
      var days=[]; var today=new Date(); today.setHours(0,0,0,0);
      var start=new Date(today); start.setDate(start.getDate()-60);
      for(var d=new Date(start); d<today; d.setDate(d.getDate()+1)){
        var iso=isoDateLocal(d), entries=[];
        SERVICE_KIOSKS.forEach(function(k){
          if(cur!=='all' && k.id!==cur) return;
          if(!isServiceDay(k.id,d,iso)) return;
          var base=defaultAssignee(d), o=ovMap[iso+'|'+k.id];
          var assignee=base; if(o&&o.claimedBy) assignee=o.claimedBy;
          var event = k.id==='bud' ? BUD_CONCERTS[iso] : null;
          entries.push({kiosk:k,iso:iso,assignee:assignee,coverage:false,requestedBy:'',event:event});
        });
        if(entries.length) days.push({iso:iso,dateObj:new Date(d),entries:entries});
      }
      return days.reverse();
    }
    function dayCard(day, past){
      var dn=day.dateObj.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'});
      var card=el('<div class="card schday'+(past?' pastday':'')+'"><div class="schdate">'+esc(dn)+'</div></div>');
      day.entries.forEach(function(e){
        var row=el('<div class="schrow'+(e.coverage?' cover':'')+'"></div>');
        var title=esc(e.kiosk.locationName)+(e.event?(' · '+e.event.e+' '+esc(e.event.n)):'');
        var info=el('<div class="grow"><div><b>'+title+'</b></div><small>'+
          (e.coverage?('⚠ Needs coverage — '+esc(e.requestedBy||'?')+' can\'t make it'):('Assigned: '+esc(e.assignee)))+'</small></div>');
        if(milkSet[e.kiosk.id] && milkSet[e.kiosk.id][e.iso]) info.appendChild(el('<div class="milkmark">🥛 Milk bag changed</div>'));
        row.appendChild(info);
        if(!past){
          if(e.coverage){
            if(e.requestedBy && e.requestedBy===me){
              row.appendChild(el('<button class="link" style="color:var(--moss)" disabled>Coverage requested ✓</button>'));
            } else {
              var pick=el('<button class="link">Pick up</button>');
              pick.onclick=function(){ if(!me) return toast('Sign in first',true); call('claimCoverage',{date:e.iso,kioskId:e.kiosk.id,claimedBy:me}).then(function(){toast('You picked it up ✓'); renderSchedule(body);}).catch(function(x){toast(x.message||x,true);}); };
              row.appendChild(pick);
            }
          } else if(e.assignee===me){
            var req=el('<button class="link" style="color:var(--muted)">Request coverage</button>');
            req.onclick=function(){ req.disabled=true; req.textContent='Coverage requested ✓'; req.style.color='var(--moss)'; call('requestCoverage',{date:e.iso,kioskId:e.kiosk.id,requestedBy:me,originalAssignee:e.assignee}).then(function(){toast('Coverage requested ✓'); renderSchedule(body);}).catch(function(x){ req.disabled=false; req.textContent='Request coverage'; req.style.color='var(--muted)'; toast(x.message||x,true); }); };
            row.appendChild(req);
          }
        }
        card.appendChild(row);
      });
      return card;
    }
    function paint(){
      filt.querySelectorAll('.chip').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-k')===cur); });
      listWrap.innerHTML='';
      var pbtn=el('<button class="schmonth'+(pastOpen?' on':'')+'">'+(pastOpen?'▾':'▸')+' Previous 60 days</button>');
      pbtn.onclick=function(){ pastOpen=!pastOpen; paint(); };
      listWrap.appendChild(pbtn);
      if(pastOpen){
        var pdays=buildPast();
        if(!pdays.length) listWrap.appendChild(el('<div class="hint">No past service days in this range.</div>'));
        else pdays.forEach(function(day){ listWrap.appendChild(dayCard(day,true)); });
      }
      var days=build();
      if(!days.length){ listWrap.appendChild(el('<div class="empty">No service days in range.</div>')); return; }
      // group by month
      var groups=[], idx={};
      days.forEach(function(day){ var mk=day.iso.slice(0,7); if(!(mk in idx)){ idx[mk]=groups.length; groups.push({mk:mk,dateObj:day.dateObj,days:[]}); } groups[idx[mk]].days.push(day); });
      groups.forEach(function(g,gi){
        var mname=g.dateObj.toLocaleDateString(undefined,{month:'long',year:'numeric'});
        var isOpen = gi===0 || expanded[g.mk]; // first month always open
        if(gi===0){
          listWrap.appendChild(el('<div class="mgrhd" style="margin-top:6px">'+esc(mname)+'</div>'));
          g.days.forEach(function(day){ listWrap.appendChild(dayCard(day)); });
        } else if(isOpen){
          var hd=el('<button class="schmonth on">▾ '+esc(mname)+' · '+g.days.length+' service days</button>');
          hd.onclick=function(){ expanded[g.mk]=false; paint(); };
          listWrap.appendChild(hd);

function chargeAmountLabel(x){
  if(x.type==='reimbursement') return '$'+(Number(x.amount)||0).toFixed(2);

}

}

function mgrLabour(body){
  body.innerHTML='<div class="center"><div class="spin"></div></div>';
  Promise.all([call('getServiceSessions'),call('getPayments'),call('getCharges')]).then(function(res){
    var list=res[0], payments=res[1]||[], charges=res[2]||[];
    body.innerHTML='';
    var sess=(list||[]).filter(function(s){ return s.startTime && s.endTime; });
    body.appendChild(el('<p class="sub" style="margin-top:0">Servicing hours, plus reimbursements and other (non-servicing) time. Filter by date range, kiosk or person, then mark things paid.</p>'));

    var kioskOpts='<option value="all">All kiosks</option>'+SERVICE_KIOSKS.map(function(k){return '<option value="'+k.id+'">'+esc(k.locationName)+'</option>';}).join('');
    var people={}; sess.forEach(function(s){ if(s.technicianName) people[s.technicianName]=true; }); charges.forEach(function(x){ if(x.personName) people[x.personName]=true; });
    var personOpts='<option value="all">All people</option>'+Object.keys(people).map(function(p){return '<option value="'+esc(p)+'">'+esc(p)+'</option>';}).join('');

    var ctl=el('<div class="card"></div>');
    ctl.appendChild(el('<label style="margin-top:0">Date range</label>'+
      '<select id="lbR"><option value="week">This week</option><option value="lastweek">Last week</option><option value="month">This month</option><option value="custom">Custom range…</option><option value="all">All time</option></select>'));
    var customRow=el('<div class="row" id="lbCustom" style="display:none"><div><label>From</label><input type="date" id="lbFrom"></div><div><label>To</label><input type="date" id="lbTo"></div></div>');
    ctl.appendChild(customRow);
    ctl.appendChild(el('<div class="row"><div><label>Kiosk</label><select id="lbK">'+kioskOpts+'</select></div>'+
      '<div><label>Person</label><select id="lbP">'+personOpts+'</select></div></div>'));
    body.appendChild(ctl);

    var lbView='hours';
    var lbToggle=el('<div class="schfilt" style="margin:2px 0 10px"></div>');
    [['hours','⏱️ Servicing hours'],['charges','🧾 Reimbursements & time']].forEach(function(t){
      var b=el('<button class="chip" data-v="'+t[0]+'">'+t[1]+'</button>'); b.onclick=function(){ lbView=t[0]; paint(); }; lbToggle.appendChild(b);
    });
    body.appendChild(lbToggle);

    var totalWrap=el('<div class="kpi"></div>'); body.appendChild(totalWrap);
    var payWrap=el('<div></div>'); body.appendChild(payWrap);
    var listWrap=el('<div class="card"><label style="margin-top:0">Servicing sessions</label><div class="feed"></div></div>'); body.appendChild(listWrap);
    var chgWrap=el('<div></div>'); body.appendChild(chgWrap);

    function mins(s){ var a=s.startTime.split(':'), b=s.endTime.split(':'); var m=(parseInt(b[0],10)*60+parseInt(b[1],10))-(parseInt(a[0],10)*60+parseInt(a[1],10)); if(m<0) m+=1440; return m; }
    function hrs(m){ return (m/60).toFixed(2); }
    function sDate(s){ return s.serviceDate || (s.completedAt?isoDateLocal(new Date(s.completedAt)):''); }
    function range(){
      var r=val('lbR'); var t=new Date(); t.setHours(0,0,0,0);
      function iso(d){ return isoDateLocal(d); }
      if(r==='all') return {from:'',to:'',label:'All time'};
      if(r==='custom') return {from:val('lbFrom'),to:val('lbTo'),label:'Custom'};
      if(r==='month'){ var a=new Date(t.getFullYear(),t.getMonth(),1), b=new Date(t.getFullYear(),t.getMonth()+1,0); return {from:iso(a),to:iso(b),label:'This month'}; }
      // week / lastweek: Monday-Sunday
      var dow=(t.getDay()+6)%7; var mon=new Date(t); mon.setDate(t.getDate()-dow);
      if(r==='lastweek'){ mon.setDate(mon.getDate()-7); }
      var sun=new Date(mon); sun.setDate(mon.getDate()+6);
      return {from:iso(mon),to:iso(sun),label:r==='lastweek'?'Last week':'This week'};
    }
    function paidFor(s){
      var d=sDate(s);
      var p=payments.filter(function(x){ return x.personName===s.technicianName && (!x.periodStart||d>=x.periodStart) && (!x.periodEnd||d<=x.periodEnd); })[0];
      return p||null;
    }
    function paint(){
      var rg=range();
      lbToggle.querySelectorAll('.chip').forEach(function(b){ b.classList.toggle('on', b.getAttribute('data-v')===lbView); });
      var showHours=lbView==='hours';
      totalWrap.style.display=showHours?'flex':'none';
      payWrap.style.display=showHours?'':'none';
      listWrap.style.display=showHours?'':'none';
      chgWrap.style.display=showHours?'none':'';
      customRow.style.display = val('lbR')==='custom' ? 'flex' : 'none';
      var fK=val('lbK'), fP=val('lbP');
      var f=sess.filter(function(s){
        var d=sDate(s);
        if(rg.from && d<rg.from) return false;
        if(rg.to && d>rg.to) return false;
        return (fK==='all'||s.kioskId===fK) && (fP==='all'||s.technicianName===fP);
      });
      var total=0, paidMin=0; f.forEach(function(s){ var m=mins(s); total+=m; if(paidFor(s)) paidMin+=m; });
      totalWrap.innerHTML='';
      totalWrap.appendChild(el('<div class="b"><div class="n">'+hrs(total)+'</div><div class="l">Total hours</div></div>'));
      totalWrap.appendChild(el('<div class="b"><div class="n">'+f.length+'</div><div class="l">Sessions</div></div>'));
      totalWrap.appendChild(el('<div class="b"><div class="n">'+hrs(total-paidMin)+'</div><div class="l">Unpaid hours</div></div>'));

      // payment action (needs a specific person + bounded range)
      payWrap.innerHTML='';
      if(fP!=='all' && rg.from && rg.to){
        var pc=el('<div class="card alertcard"><label style="margin-top:0">Record payment — '+esc(fP)+'</label></div>');
        pc.appendChild(el('<div class="hint">Covers '+esc(rg.from)+' → '+esc(rg.to)+' ('+hrs(total)+' h across '+f.length+' sessions).</div>'));
        pc.appendChild(el('<label>Paid date</label><input type="date" id="payDate">'));
        pc.appendChild(el('<label>Notes (optional)</label><input id="payNote" placeholder="e.g. biweekly run, adjusted for a no-show">'));
        var pb=el('<button class="btn">Mark this period as paid</button>');
        pc.appendChild(pb); payWrap.appendChild(pc);
        pc.querySelector('#payDate').value=isoDateLocal(new Date());
        pb.onclick=function(){
          var pd=val('payDate'), pn=val('payNote');
          loading('Saving…');
          call('savePayment',{personName:fP,periodStart:rg.from,periodEnd:rg.to,paidDate:pd,notes:pn})
            .then(function(){ toast('Marked paid ✓'); mgrOpen('labour'); }).catch(function(e){ toast(e.message||e,true); });
        };
        // existing payments overlapping this person
        var mine=payments.filter(function(x){ return x.personName===fP; });
        if(mine.length){
          var ec=el('<div class="card"><label style="margin-top:0">Payments on record — '+esc(fP)+'</label></div>');
          mine.forEach(function(x){
            var r=el('<div class="mgr-row"><div class="grow"><div><b>'+esc(x.periodStart)+' → '+esc(x.periodEnd)+'</b></div>'+
              '<small>Paid '+esc(x.paidDate||'—')+(x.notes?' · '+esc(x.notes):'')+'</small></div><button class="link" style="color:var(--muted)">Undo</button></div>');
            r.querySelector('.link').onclick=function(){ call('voidPayment',x.id).then(function(){toast('Removed ✓');mgrOpen('labour');}).catch(function(e){toast(e.message||e,true);}); };
            ec.appendChild(r);
          });
          payWrap.appendChild(ec);
        }
      } else if(fP==='all'){
        payWrap.appendChild(el('<div class="hint" style="margin:0 2px 8px">Pick a single person (and a week/month/custom range) to mark a period as paid.</div>'));
      }

      var feed=listWrap.querySelector('.feed'); feed.innerHTML='';
      if(!f.length){ feed.innerHTML='<div class="empty">No servicing sessions with start &amp; end times in this range.</div>'; }
      else f.forEach(function(s){
        var p=paidFor(s);
        var badge=p?('<span class="badge b-overlap">Paid '+esc(p.paidDate||'')+'</span>'):'<span class="badge b-unique">Unpaid</span>';
        feed.appendChild(el('<div class="hrow"><div class="grow"><div><b>'+esc(s.locationName)+'</b> · '+esc(s.technicianName||'—')+' '+badge+'</div>'+
          '<small>'+esc(sDate(s)||svcDate(s.completedAt||s.startedAt))+' · '+esc(s.startTime)+'–'+esc(s.endTime)+'</small></div>'+
          '<div class="hwhen">'+hrs(mins(s))+' h</div></div>'));
      });

      // ---- reimbursements & other (non-servicing) charges ----
      chgWrap.innerHTML='';
      var cf=charges.filter(function(x){
        if(rg.from && x.date<rg.from) return false;
        if(rg.to && x.date>rg.to) return false;
        return (fP==='all'||x.personName===fP);
      });
      var reimb=cf.filter(function(x){return x.type==='reimbursement';});
      var misc=cf.filter(function(x){return x.type==='misc_time';});
      var dueAmt=reimb.filter(function(x){return !x.paid;}).reduce(function(a,b){return a+(Number(b.amount)||0);},0);
      var miscHrs=misc.reduce(function(a,b){return a+(Number(b.hours)||0);},0);
      var miscUnpaidHrs=misc.filter(function(x){return !x.paid;}).reduce(function(a,b){return a+(Number(b.hours)||0);},0);
      var cc=el('<div class="card"><label style="margin-top:0">Reimbursements & other time</label></div>');
      var k=el('<div class="kpi"></div>');
      k.appendChild(el('<div class="b"><div class="n">$'+dueAmt.toFixed(2)+'</div><div class="l">To reimburse</div></div>'));
      k.appendChild(el('<div class="b"><div class="n">'+miscHrs.toFixed(2)+'</div><div class="l">Other hours</div></div>'));
      k.appendChild(el('<div class="b"><div class="n">'+miscUnpaidHrs.toFixed(2)+'</div><div class="l">Unpaid other h</div></div>'));
      cc.appendChild(k);
      var cfeed=el('<div class="feed"></div>'); cc.appendChild(cfeed);
      if(!cf.length){ cfeed.appendChild(el('<div class="empty">No reimbursements or other-time charges in this range.</div>')); }
      cf.forEach(function(x){
        var row=chargeRow(x,true);
        var act=el('<div class="chgactions"></div>');
        if(x.paid){
          var u=el('<button class="btn ghost">Mark unpaid</button>');
          u.onclick=function(){ call('setChargePaid',x.id,false,'','').then(function(){toast('Updated ✓');mgrOpen('labour');}).catch(function(e){toast(e.message||e,true);}); };
          act.appendChild(u);
        } else {
          var mk=el('<button class="btn ghost">Mark paid</button>');
          mk.onclick=function(){
            if(row.querySelector('.paybox')) { row.querySelector('.paybox').remove(); return; }
            var box=el('<div class="paybox card" style="margin-top:10px"><label style="margin-top:0">Paid date</label><input type="date" class="cpDate"><label>Notes (optional)</label><input class="cpNote" placeholder="anomaly?"><button class="btn" style="margin-top:10px">Confirm paid</button></div>');
            box.querySelector('.cpDate').value=isoDateLocal(new Date());
            box.querySelector('.btn').onclick=function(){
              var pd=box.querySelector('.cpDate').value, pn=box.querySelector('.cpNote').value;
              call('setChargePaid',x.id,true,pd,pn).then(function(){toast('Marked paid ✓');mgrOpen('labour');}).catch(function(e){toast(e.message||e,true);});
            };
            row.appendChild(box);
          };
          act.appendChild(mk);
        }
        var del=el('<button class="link chgremove">Remove</button>');
        del.onclick=function(){ call('voidCharge',x.id).then(function(){toast('Removed ✓');mgrOpen('labour');}).catch(function(e){toast(e.message||e,true);}); };
        act.appendChild(del);
        row.appendChild(act);
        cfeed.appendChild(row);
      });
      chgWrap.appendChild(cc);
    }
    ctl.querySelector('#lbR').onchange=paint; ctl.querySelector('#lbK').onchange=paint; ctl.querySelector('#lbP').onchange=paint;
    customRow.querySelector('#lbFrom').onchange=paint; customRow.querySelector('#lbTo').onchange=paint;
    paint();
  }).catch(function(e){body.innerHTML='<div class="empty">'+esc(e.message||e)+'</div>';});
}

function itemRow(sec,it){

      '<div class="lab"><div class="nm">'+esc(it.label)+(it.required?'<span class="req">required</span>':'')+'</div>'+ref+'</div></div>'+

function refreshSvcProgress(){
  var bar=document.getElementById('svcProg'); if(!bar)return;
  var k=svcKiosk(SERVICE.kioskId); if(!k)return;
  var total=0,done=0,reqLeft=0;
  k.sections.forEach(function(sec){ sec.items.forEach(function(it){ total++; var s=SERVICE.st[it.id]||{}; if(s.completed)done++; if(it.required&&!s.completed)reqLeft++; }); });
  var pct=total?Math.round(done/total*100):0;
  bar.style.width=pct+'%';
  var lbl=document.getElementById('svcProgLbl');
  if(lbl) lbl.textContent=done+' of '+total+' done · '+(reqLeft?(reqLeft+' required left'):'all required done ✓');

function buildCompletions(k){

    var s=SERVICE.st[it.id]||{completed:false,notes:'',flagged:false};
    out.push({itemId:it.id,section:sec.title,label:it.label,itemType:it.itemType,required:it.required,
      completed:!!s.completed,flagged:!!s.flagged,notes:s.notes||''});
  });});

function svcAutosaveSoon(){ if(!_svcActive) return; _svcDirty=true; markSaving(); if(_svcTimer) clearTimeout(_svcTimer); _svcTimer=setTimeout(function(){ svcAutosaveNow(false); }, 1500); }
function svcAutosaveNow(force){
  if(!_svcActive) return;
  if(_svcSaving){ _svcDirty=true; return; }
  if(!_svcDirty && !force) return;
  var k=svcKiosk(SERVICE.kioskId); if(!k) return;
  if(_svcTimer){ clearTimeout(_svcTimer); _svcTimer=null; }
  _svcDirty=false; _svcSaving=true;
  var payload={ id:SERVICE.sessionId, kioskId:k.id, locationName:k.locationName, model:k.model,
    checklistVersion:k.checklistVersion, technicianName:APP.me.name, startedAt:SERVICE.startedAt,
    serviceDate:val('svcDateInp'), startTime:val('svcStart'), endTime:val('svcEnd'),
    milkBagChanged:!!SERVICE.milkBagChanged,
    status:'in_progress', completions:buildCompletions(k), overallNotes:val('svcOverall'), incompleteReason:'' };
  call('saveServiceSession',payload).then(function(r){
    if(r&&r.id) SERVICE.sessionId=r.id;
    _svcSaving=false;
    if(_svcDirty){ svcAutosaveNow(false); } else { markSaved(); }
  }).catch(function(){ _svcSaving=false; _svcDirty=true; });
}

function submitService(mode){

  if(flaggedNoNote.length) return toast('Add a note to each flagged item ('+flaggedNoNote.length+' missing)',true);
  var _st=val('svcStart'), _et=val('svcEnd');
  if(_st && _et && _et < _st) return toast('End time can’t be earlier than the start time',true);
  var status='in_progress', reason='';
  if(mode==='complete'){
    if(!_st || !_et){ markTimeMissing(!_st,!_et); return toast('Add '+((!_st&&!_et)?'a start and end time':(!_st?'a start time':'an end time'))+' before completing',true); }
    var reqInc=comps.filter(function(c){return c.required && !c.completed;});
    if(reqInc.length){
      var wrap=document.getElementById('svcReasonWrap'); wrap.style.display='block';
      reason=val('svcReason').trim();
      if(!reason){ wrap.scrollIntoView({behavior:'smooth'}); return toast(reqInc.length+' required item(s) unchecked — add a reason to submit',true); }
      status='incomplete';
    } else { status='completed'; }
  }
  var payload={ id:SERVICE.sessionId, kioskId:k.id, locationName:k.locationName, model:k.model,
    checklistVersion:k.checklistVersion, technicianName:APP.me.name, startedAt:SERVICE.startedAt,
    serviceDate:val('svcDateInp'), startTime:val('svcStart'), endTime:val('svcEnd'),
    milkBagChanged: !!SERVICE.milkBagChanged,
    status:status, completions:comps, overallNotes:val('svcOverall'), incompleteReason:reason };
  _svcActive=false; _svcDirty=false; if(_svcTimer){ clearTimeout(_svcTimer); _svcTimer=null; }
  loading('Saving…');
  call('saveServiceSession',payload).then(function(r){
    SERVICE.sessionId=r.id;
    toast(status==='completed'?'Service completed ✓':status==='incomplete'?'Submitted (incomplete) ✓':'Progress saved ✓');
    go('service');
  }).catch(function(e){ toast(e.message||e,true); screenServiceChecklist(); });
}

// ---------- HISTORY ----------
function screenServiceHistory(){
  VIEW.repaint=screenServiceHistory;
  M.innerHTML=''; M.appendChild(backBtn('service'));
  M.appendChild(el('<div><h2>Service history</h2><p class="sub">Every completed and in-progress session.</p></div>'));
  var wrap=el('<div class="card"><div class="feed"></div></div>'); var feed=wrap.querySelector('.feed');
  feed.innerHTML='<div class="center"><div class="spin"></div></div>'; M.appendChild(wrap);
  call('getServiceSessions').then(function(list){
    list=list||[];
    feed.innerHTML='';
    if(!list.length){ feed.innerHTML='<div class="empty">No sessions yet.</div>'; return; }
    list.forEach(function(s){ feed.appendChild(historySessionRow(s)); });
  }).catch(function(e){ feed.innerHTML='<div class="empty">'+esc(e.message||e)+'</div>'; });
}
function statusPill(status){ return status==='completed'?'<span class="badge b-overlap">Completed</span>':status==='incomplete'?'<span class="badge b-unique">Incomplete</span>':'<span class="badge b-model">In progress</span>'; }
function historySessionRow(s){
  var r=el('<div class="hrow"><div class="grow"><div><b>'+esc(s.locationName)+'</b> · '+esc(s.model)+'</div>'+
    '<small>'+esc(s.technicianName||'—')+' · '+esc(svcDate(s.completedAt||s.startedAt))+' · '+s.percentComplete+'%</small>'+
    '<div style="margin-top:5px">'+statusPill(s.status)+(s.requiredIncomplete?' <span class="hint">'+s.requiredIncomplete+' required incomplete</span>':'')+'</div></div>'+
    '<div class="chev" style="color:var(--lime-deep)">›</div></div>');
  r.style.cursor='pointer';
  r.onclick=function(){ SERVICE.detailId=s.id; go('serviceDetail'); };
  return r;
}
function screenServiceDetail(){
  VIEW.repaint=screenServiceDetail;
  M.innerHTML=''; M.appendChild(backBtn('serviceHistory'));
  var body=el('<div><div class="center"><div class="spin"></div></div></div>'); M.appendChild(body);
  call('getServiceSession',SERVICE.detailId).then(function(s){
    body.innerHTML='';
    body.appendChild(el('<div><h2>'+esc(s.locationName)+'</h2><p class="sub">'+esc(s.model)+' · '+esc(s.checklistVersion)+'</p></div>'));
    var head=el('<div class="card"></div>');
    head.appendChild(el('<div class="mgr-row" style="border:none;padding-top:0"><div class="grow"><div>'+statusPill(s.status)+' &nbsp; <b>'+s.percentComplete+'%</b> complete</div>'+
      '<small>'+esc(s.technicianName||'—')+' · started '+esc(svcDate(s.startedAt))+(s.completedAt?' · finished '+esc(svcDate(s.completedAt)):'')+'</small></div></div>'));
    head.appendChild(el('<div class="prog"><i style="width:'+s.percentComplete+'%"></i></div>'));
    if(s.incompleteReason) head.appendChild(el('<div class="hint" style="margin-top:10px"><b>Reason for incomplete:</b> '+esc(s.incompleteReason)+'</div>'));
    if(s.overallNotes) head.appendChild(el('<div class="hint" style="margin-top:8px"><b>Overall notes:</b> '+esc(s.overallNotes)+'</div>'));
    body.appendChild(head);
    // group completions by section
    var bySec=[]; var idx={};
    (s.completions||[]).forEach(function(c){ if(!(c.section in idx)){ idx[c.section]=bySec.length; bySec.push({title:c.section,items:[]}); } bySec[idx[c.section]].items.push(c); });
    bySec.forEach(function(g){
      var card=el('<div class="card"><label style="margin-top:0">'+esc(g.title)+'</label></div>');
      g.items.forEach(function(c){
        card.appendChild(el('<div class="citem" style="padding:9px 0"><div class="crow">'+
          '<div style="flex:none;font-size:17px">'+(c.completed?'✅':'⬜')+'</div>'+
          '<div class="lab"><div class="nm">'+esc(c.label)+(c.flagged?' <span class="badge b-unique">flagged</span>':'')+(c.required&&!c.completed?'<span class="req">missed</span>':'')+'</div>'+
          (c.notes?'<div class="sub2">'+esc(c.notes)+'</div>':'')+'</div></div></div>'));
      });
      body.appendChild(card);
    });
  }).catch(function(e){ body.innerHTML='<div class="empty">'+esc(e.message||e)+'</div>'; });
}

// ---------- MANAGER: SERVICING REPORTS ----------
function mgrService(body){
  body.innerHTML='<div class="center"><div class="spin"></div></div>';
  Promise.all([call('getServiceReport'),call('getServiceSessions')]).then(function(res){
    var rep=res[0]||{}, sessions=res[1]||[];
    rep.completedByKiosk=rep.completedByKiosk||{}; rep.recentByKiosk=rep.recentByKiosk||{};
    rep.incompleteItems=rep.incompleteItems||[]; rep.flaggedItems=rep.flaggedItems||[];
    rep.grayWaterHistory=rep.grayWaterHistory||[]; rep.recentNotes=rep.recentNotes||[];
    body.innerHTML='';
    body.appendChild(el('<div class="kpi">'+
      '<div class="b"><div class="n" style="color:var(--lime-deep)">'+rep.calibrationIssues+'</div><div class="l">Calibration issues</div></div>'+
      '<div class="b"><div class="n" style="color:var(--lime-deep)">'+rep.sensorIssues+'</div><div class="l">Sensor issues</div></div>'+
      '<div class="b"><div class="n" style="color:var(--moss)">'+sessions.filter(function(s){return s.status==='completed';}).length+'</div><div class="l">Completed</div></div></div>'));

    var byk=el('<div class="card"><label style="margin-top:0">Services by kiosk</label></div>');
    SERVICE_KIOSKS.forEach(function(k){
      var n=rep.completedByKiosk[k.locationName]||0; var last=rep.recentByKiosk[k.locationName];
      byk.appendChild(el('<div class="mgr-row"><div class="grow"><div>'+esc(k.locationName)+' <small>'+esc(k.model)+'</small></div>'+
        '<small>'+(last?('last '+esc(svcDate(last))):'never serviced')+'</small></div><div class="qty num">'+n+'</div></div>'));
    });
    body.appendChild(byk);

    if(rep.incompleteItems.length){
      var ic=el('<div class="card"><label style="margin-top:0">Most-missed required items</label></div>');
      rep.incompleteItems.forEach(function(x){ ic.appendChild(el('<div class="mgr-row"><div class="grow">'+esc(x.label)+'</div><div class="qty num">'+x.count+'</div></div>')); });
      body.appendChild(ic);
    }
    if(rep.flaggedItems.length){
      var fc=el('<div class="card"><label style="margin-top:0">Most-flagged items</label></div>');
      rep.flaggedItems.forEach(function(x){ fc.appendChild(el('<div class="mgr-row"><div class="grow">'+esc(x.label)+'</div><div class="qty num">'+x.count+'</div></div>')); });
      body.appendChild(fc);
    }
    if(rep.grayWaterHistory.length){
      var gc=el('<div class="card"><label style="margin-top:0">Gray water disposal history</label></div>');
      rep.grayWaterHistory.forEach(function(g){ gc.appendChild(el('<div class="mgr-row"><div class="grow">'+esc(g.loc)+' <small>'+esc(svcDate(g.when))+'</small></div><span class="badge '+(g.completed?'b-overlap':'b-unique')+'">'+(g.completed?'emptied':'not emptied')+'</span></div>')); });
      body.appendChild(gc);
    }
    if(rep.recentNotes.length){
      var nc=el('<div class="card"><label style="margin-top:0">Recent notes & issues</label></div>');
      rep.recentNotes.forEach(function(nt){ nc.appendChild(el('<div class="hrow"><div class="grow"><div><b>'+esc(nt.label)+'</b> · '+esc(nt.loc)+'</div><small>'+esc(nt.note)+'</small></div><div class="hwhen">'+esc(svcDate(nt.when))+'</div></div>')); });
      body.appendChild(nc);
    }
    var allc=el('<div class="card"><label style="margin-top:0">All sessions</label><div class="feed"></div></div>'); var feed=allc.querySelector('.feed');
    if(!sessions.length) feed.innerHTML='<div class="empty">No sessions yet.</div>';
    else sessions.forEach(function(s){ feed.appendChild(historySessionRow(s)); });
    body.appendChild(allc);
  }).catch(function(e){ body.innerHTML='<div class="empty">'+esc(e.message||e)+'</div>'; });
}
